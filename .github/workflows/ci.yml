name: iOS CI

# Triggers: runs ONLY when commits are pushed to the `dev` branch.
on:
  push:
    branches: [dev]

jobs:
  build-and-screenshot:
    name: Build + UI Screenshots
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode + Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project "Snapback Dynasty.xcodeproj" \
            -scheme "Snapback Dynasty" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}
        shell: bash

      # Runs unit + UI tests and writes a result bundle we can mine for screenshots.
      # continue-on-error so artifact upload still happens even if a test fails.
      - name: Run tests
        continue-on-error: true
        run: |
          xcodebuild test \
            -project "Snapback Dynasty.xcodeproj" \
            -scheme "Snapback Dynasty" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}
        shell: bash

      # xcparse pulls every XCTAttachment (the PNGs from ScreenshotUITests)
      # out of the .xcresult bundle into a flat folder.
      - name: Install xcparse
        run: brew install chargepoint/xcparse/xcparse

      - name: Extract screenshots
        if: always()
        run: |
          mkdir -p screenshots
          xcparse screenshots TestResults.xcresult screenshots/ || echo "No screenshots found"
          ls -la screenshots/
        shell: bash

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Upload full test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
          if-no-files-found: warn
