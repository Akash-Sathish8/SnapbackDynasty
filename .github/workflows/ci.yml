name: iOS CI

# Triggers: this workflow ONLY runs when someone pushes commits to the `dev` branch.
# Pushes to main or any other branch will not run this workflow.
on:
  push:
    branches: [dev]

jobs:
  build-and-screenshot:
    name: Build + Simulator Screenshot
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode + Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project "Snapback Dynasty.xcodeproj" \
            -scheme "Snapback Dynasty" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}
        shell: bash

      # If/when a test target is added, this step will run it automatically.
      # Remove the `continue-on-error` once tests exist so failures block the build.
      - name: Run tests (if any)
        continue-on-error: true
        run: |
          xcodebuild test \
            -project "Snapback Dynasty.xcodeproj" \
            -scheme "Snapback Dynasty" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}
        shell: bash

      - name: Boot simulator + install app
        run: |
          DEVICE_ID=$(xcrun simctl create "CI iPhone" "iPhone 15" || xcrun simctl list devices | grep "iPhone 15 (" | head -1 | grep -oE "[A-F0-9-]{36}")
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "Snapback Dynasty.app" | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"

          # Give the app a moment to render its initial screen
          sleep 6

          mkdir -p screenshots
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/home.png
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
        shell: bash

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: warn
